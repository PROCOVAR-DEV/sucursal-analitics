server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Assets con hash en el nombre: se pueden cachear indefinidamente.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # index.html nunca se cachea, para que cada deploy se vea al instante.
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    expires -1;
  }

  # Frontend SPA — la raíz "/" también sirve index.html y NO debe cachearse
  # (si no, el navegador queda clavado en un bundle viejo).
  location / {
    try_files $uri /index.html;
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    expires -1;
  }

  # API proxy al backend
  location /api/ {
    proxy_pass http://backend:8000/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    client_max_body_size 50m;
  }
}
