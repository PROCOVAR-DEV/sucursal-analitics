server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Frontend SPA
  location / {
    try_files $uri /index.html;
  }

  # API proxy al backend
  location /api/ {
    proxy_pass http://backend:8000/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    client_max_body_size 50m;
  }
}
